# Docker Compose configuration for the flight delay analysis project
version: '3.8'

services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=flightcluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=2
      - HDFS_CONF_dfs_permissions_enabled=false
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ./data:/data
      - ./scripts:/scripts
      - ./phase2_pyspark:/opt/project/phase2_pyspark
      - ./phase3_hive:/opt/project/phase3_hive
      - ./phase4_ml:/opt/project/phase4_ml
      - ./phase5_viz:/opt/project/phase5_viz
    networks:
      - flightnet

  datanode-1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode-1
    hostname: datanode-1
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SERVICE_PRECONDITION=namenode:9870
    volumes:
      - hadoop_datanode1:/hadoop/dfs/data
    depends_on:
      - namenode
    networks:
      - flightnet

  datanode-2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode-2
    hostname: datanode-2
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SERVICE_PRECONDITION=namenode:9870
    volumes:
      - hadoop_datanode2:/hadoop/dfs/data
    depends_on:
      - namenode
    networks:
      - flightnet

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark-master
    image: flight-delay-spark-master:3.3.0-hadoop3.3-numpy
    container_name: spark-master
    hostname: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    environment:
      - INIT_DAEMON_STEP=setup_spark
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes:
      - ./data:/data
      - ./phase2_pyspark:/opt/project/phase2_pyspark
      - ./phase3_hive:/opt/project/phase3_hive
      - ./phase4_ml:/opt/project/phase4_ml
      - ./phase5_viz:/opt/project/phase5_viz
    depends_on:
      - namenode
    networks:
      - flightnet

  spark-worker-1:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker-1
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=3G
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes:
      - ./data:/data
      - ./phase2_pyspark:/opt/project/phase2_pyspark
      - ./phase4_ml:/opt/project/phase4_ml
    depends_on:
      - spark-master
    networks:
      - flightnet

  spark-worker-2:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker-2
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=3G
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes:
      - ./data:/data
      - ./phase2_pyspark:/opt/project/phase2_pyspark
      - ./phase4_ml:/opt/project/phase4_ml
    depends_on:
      - spark-master
    networks:
      - flightnet

  hive-metastore-postgresql:
    image: bde2020/hive-metastore-postgresql:2.3.0
    container_name: hive-metastore-postgresql
    hostname: hive-metastore-postgresql
    networks:
      - flightnet

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-metastore
    hostname: hive-metastore
    command: /opt/hive/bin/hive --service metastore
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionURL=jdbc:postgresql://hive-metastore-postgresql/metastore
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName=org.postgresql.Driver
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName=hive
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword=hive
      - SERVICE_PRECONDITION=namenode:9870 datanode-1:9864 hive-metastore-postgresql:5432
    ports:
      - "9083:9083"
    depends_on:
      - hive-metastore-postgresql
      - namenode
      - datanode-1
    networks:
      - flightnet

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-server
    hostname: hive-server
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionURL=jdbc:postgresql://hive-metastore-postgresql/metastore
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName=org.postgresql.Driver
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName=hive
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword=hive
      - SERVICE_PRECONDITION=hive-metastore:9083
    ports:
      - "10000:10000"
      - "10002:10002"
    volumes:
      - ./phase3_hive:/opt/project/phase3_hive
    depends_on:
      - hive-metastore
    networks:
      - flightnet

  plotter:
    image: python:3.10-slim
    container_name: plotter
    working_dir: /app
    volumes:
      - ./data:/data
      - ./phase5_viz:/app
    command: bash -lc "pip install -r requirements.txt && python make_plots_local.py"
    networks:
      - flightnet

networks:
  flightnet:
    driver: bridge

volumes:
  hadoop_namenode:
  hadoop_datanode1:
  hadoop_datanode2: